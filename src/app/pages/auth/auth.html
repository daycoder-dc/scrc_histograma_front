<div
  class="bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen min-w-screen overflow-hidden">
  <div class="flex flex-col items-center justify-center">
    <div
      style="border-radius: 56px; padding: 0.3rem; background: linear-gradient(180deg, var(--primary-color) 10%, rgba(33, 150, 243, 0) 30%)">
      <div class="w-full bg-surface-0 dark:bg-surface-900 py-20 px-8 sm:px-20" style="border-radius: 53px">
        <div class="text-center mb-8">
          <!-- logo -->
          <div class="flex"></div>
          <div class="text-surface-900 dark:text-surface-0 text-3xl font-medium mb-4">SCR Dashboard</div>
          <span>Iniciar Sesión</span>
        </div>
        <div>
          <!-- campo usuario -->
          <label for="email1" class="block text-surface-900 dark:text-surface-0 text-xl font-medium mb-2">Usuario</label>
          <input pInputText id="email1" type="text" placeholder="Usuario" class="w-full md:w-120 mb-8"
            [(ngModel)]="email" />

          <!-- campo contraseña -->
          <label for="password1" class="block text-surface-900 dark:text-surface-0 font-medium text-xl mb-2">Contraseña</label>
          <p-password id="password1" [(ngModel)]="password" placeholder="Password" [toggleMask]="true"
            [fluid]="true" [feedback]="false"></p-password>

          <div class="mt-2 mb-8"></div>
          <!-- boton ingresar -->
          <p-button label="Sign In" styleClass="w-full" routerLink="/"></p-button>
        </div>
      </div>
    </div>
  </div>
</div>
