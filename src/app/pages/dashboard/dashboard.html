<div class="flex flex-col gap-y-4">
  <!-- top panel -->
  <div class="flex justify-between items-center">
    <div class="flex">
      <h3 class="font-bold">Panel de Control SCR</h3>
    </div>
    <div class="flex flex-col items-end">
      <span class="font-bold">17 de marzo de 2026</span>
      <span class="text-xs">Datos actualzados en tiempo real</span>
    </div>
  </div>

  <!-- indicadores -->
  <om-marquee animationDuration="40s">
    @for (card of data_indicadores(); track $index) {
    <ng-template [omMarqueeItem]="card">
      <p-card [pt]="{
        root: { class: 'overflow-hidden'},
        body: { class: card.background ? 'bg-primary' : '' }
      }">
        <div class="flex flex-col gap-2 w-56 my-3">
          <span class="text-3xl font-extrabold" [ngClass]="card.color">
            @if (card.modeda) {
            <span>&dollar;</span>
            }
            <span>{{card.value | number }}</span>
          </span>
          <span class="text-sm font-semibold uppercase"
            [ngClass]="{'text-gray-200':card.background}">{{card.description}}</span>
        </div>
      </p-card>
    </ng-template>
    }
  </om-marquee>

  <div class="flex gap-2 flex-wrap">
    <!-- Grafico - Distribución horaria y valor -->
    <p-card header="Distribución Horaria y Valor" class="w-full xl:w-7/12">
      <p-chart type="line" [data]="data_distribucion_horaria" [options]="options_distribucion_horaria" class="h-120" />
    </p-card>

    <!-- Tipo de actividades -->
    <p-card header="Tipo de Actividades" class="flex-1">
      <div class="card">
        <p-table [value]="data_tipo_actividades" size="small">
          <ng-template #header>
            <tr>
              <th class="bg-gray-400">ACTIVIDAD</th>
              <th class="bg-gray-400">OS</th>
              <th class="bg-gray-400">INGRESO</th>
            </tr>
          </ng-template>
          <ng-template #body let-item>
            <tr>
              <td>{{ item.actividad }}</td>
              <td>{{ item.os }}</td>
              <td>{{ item.ingreso }}</td>
            </tr>
          </ng-template>
        </p-table>
      </div>
    </p-card>
  </div>
</div>
