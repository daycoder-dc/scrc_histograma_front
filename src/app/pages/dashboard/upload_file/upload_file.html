<p-dialog header="Cargar DB" [modal]="true" [(visible)]="visible" [style]="{ width: '25rem' }">
  <div class="flex flex-col gap-4" [formGroup]="form">
    <div class="flex flex-col gap-1">
      <label for="zona">Zona</label>
      <p-select
        formControlName="zona"
        id="zona_file"
        [options]="zona_items"
        [fluid]="true"
        placeholder="Seleccionar zona"
        [invalid]="is_invalid('zona')" />
        @if (is_invalid('zona')) {
          <p-message severity="error" size="small" variant="simple">requerido</p-message>
        }
    </div>
    <div class="flex flex-col gap-2 justify-center">
        <p-fileupload
          id="file_upload"
          mode="basic"
          chooseLabel="Eligir archivo ..."
          chooseIcon="pi pi-upload"
          [fileLimit]="1"
          accept=".xls,.xlsx"
          (onSelect)="on_upload($event)"/>
        @if (is_invalid('file')) {
          <p-message severity="error" size="small" variant="simple">requerido</p-message>
        }
    </div>
  </div>
  <div class="flex justify-end mt-8">
    <p-button label="Subir archivo" severity="secondary" (onClick)="on_send_file($event)" />
  </div>
</p-dialog>

<p-toast/>
<p-confirmdialog />
